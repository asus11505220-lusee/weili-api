name: Daily Lottery Crawler

on:
  schedule:
    # 每天台灣時間晚上 10 點 (UTC 時間 14:00) 自動執行
    - cron: '0 14 * * *'
  workflow_dispatch: # 允許我們隨時在網頁上手動點擊執行，方便測試

jobs:
  run-python-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 重要：允許機器人把更新後的 CSV 存回你的 GitHub

    steps:
    - name: 1. 取得最新程式碼 (Checkout)
      uses: actions/checkout@v4

    - name: 2. 設定 Python 執行環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝爬蟲所需套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 執行你的爬蟲主程式
      run: |
        python crawler.py

    - name: 5. 預先計算回測快取 JSON
      run: |
        python precompute_cache.py

    - name: 6. 將有變動的 CSV 和快取 JSON 存檔並上傳回 GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add *.csv *_backtest_15.json
        git commit -m "🤖 自動更新彩券歷史資料與回測快取" || echo "今天沒有新資料，無須更新"
        git push
